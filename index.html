<!DOCTYPE html>
<html lang="en">
<head>
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="netflix.css" />
</head>
<body>
  <header class="site-header">
    <div class="brand">Netflex</div>
    <nav class="nav-links">
      <a href="#">Home</a>
      <a href="#">TV Shows</a>
      <a href="#">Movies</a>
      <a href="#">My List</a>
      <a href="#">My Music</a>
    </nav>
    <div class="actions">
      <input id="searchInput" type="search" placeholder="Search titles" aria-label="Search titles" />
      <button class="profile-btn">AL</button>
    </div>
  </header>

  <section class="hero">
    <div class="hero-content">
      <p class="tag">Popular on Netflex</p>
      <h1>Unlimited movies, TV shows, and more.</h1>
      <p>Watch anywhere. Cancel anytime. Ready to watch something amazing?</p>
      <div class="hero-actions">
        <button class="btn btn-primary">Play</button>
        <button class="btn btn-secondary">More Info</button>
      </div>
    </div>
  </section>

  <main>
    <section class="rows" id="movieRows"></section>
    <p class="video-instruction">Click any movie card to play the preview.</p>
  </main>
<div style="left: 0; width: 100%; height: 0; position: relative; padding-bottom: 56.25%;"><iframe src="https://www.youtube.com/embed/_4S9H7J_HM4?rel=0" style="top: 0; left: 0; width: 100%; height: 100%; position: absolute; border: 0;" allowfullscreen scrolling="no" allow="accelerometer *; clipboard-write *; encrypted-media *; gyroscope *; picture-in-picture *; web-share *;" referrerpolicy="strict-origin"></iframe></div>
  <footer class="page-footer">
    <p>@ venky netflix 2026</p>
  </footer>

  <script src="netflix.js"></script>
</body>
</html>
